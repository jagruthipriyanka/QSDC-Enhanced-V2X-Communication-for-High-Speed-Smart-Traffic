[build]
  publish = "frontend"

# Proxy all API calls from Netlify frontend to the Render backend
# Replace RENDER_URL below after deploying the backend to Render
[[redirects]]
  from = "/api/*"
  to = "https://YOUR_RENDER_BACKEND_URL/api/:splat"
  status = 200
  force = true

# SPA fallback (serves index.html for any unmatched route)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
